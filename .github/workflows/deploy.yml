name: Deploy to GitHub Pages

on:
  push:
    branches: [main, concept]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          path: main

      - name: Checkout concept
        uses: actions/checkout@v4
        with:
          ref: concept
          path: concept
        continue-on-error: true

      - name: Assemble site
        run: |
          mkdir -p _site/concept
          cp main/index.html _site/index.html
          if [ -f concept/index.html ]; then
            cp concept/index.html _site/concept/index.html
            echo "Concept index.html copied"
          else
            echo "WARNING: concept/index.html not found"
          fi
          ls -laR _site/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
